<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGLP Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{height:100vh;display:flex;flex-direction:column;background:#1e1e1e;color:white;font-family:Segoe UI;overflow:hidden;}

#topbar{height:50px;background:#181818;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid #333;}
#title{font-weight:700;}
button{background:#0e639c;color:#fff;border:0;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;}
button:hover{background:#1177bb;}

#main{flex:1;display:flex;overflow:hidden;}

#explorer{width:260px;background:#252526;border-right:1px solid #333;display:flex;flex-direction:column;}
#explorerHeader{padding:10px;font-size:12px;color:#ccc;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;}
#explorerHeader span{display:flex;gap:4px;align-items:center;}

.sectionLabel{padding:6px 10px;font-size:11px;text-transform:uppercase;color:#888;border-bottom:1px solid #333;background:#1f1f1f;}
.file{padding:6px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;}
.file:hover{background:#2d2d30;}
.file.active{background:#37373d;}
.fileIcon{font-size:11px;opacity:0.8;}

#editorWrap{flex:1;display:flex;flex-direction:column;position:relative;}
#tabBar{height:34px;background:#252526;display:flex;align-items:center;border-bottom:1px solid #333;padding-left:8px;}
.tab{padding:6px 10px;background:#1e1e1e;border-right:1px solid #333;font-size:13px;}

#editor{
  position:absolute;
  top:34px;
  left:0;
  right:0;
  bottom:0;
  padding:12px;
  font-family:Consolas, monospace;
  font-size:14px;
  background:#1e1e1e;
  color:white;
  border:none;
  outline:none;
  resize:none;
  overflow:auto;
  white-space:pre;
}

#preview{width:360px;background:#fff;color:#000;overflow-y:auto;padding:12px;}

#console{height:120px;background:#111;border-top:1px solid #333;overflow:auto;font-family:Consolas, monospace;padding:8px;font-size:12px;}

.previewText{margin:6px 0;}
img{max-width:100%;margin:6px 0;}
</style>
</head>
<body>

<div id="topbar">
  <div id="title">WGLP Studio</div>
  <div style="display:flex; gap:10px;">
    <button onclick="run()">Run</button>
  </div>
</div>

<div id="main">

  <div id="explorer">
    <div id="explorerHeader">
      <span>Explorer</span>
      <span>
        <button onclick="addFile()">+</button>
        <input type="file" id="fileUpload" multiple accept="image/*" style="display:none" onchange="uploadFiles(event)">
        <button onclick="document.getElementById('fileUpload').click()">Upload</button>
      </span>
    </div>
    <div id="fileList"></div>
  </div>

  <div id="editorWrap">
    <div id="tabBar"><div class="tab" id="tabName">main.wglp</div></div>
    <textarea id="editor"></textarea>
  </div>

  <div id="preview"></div>

</div>

<div id="console"></div>

<script>
let projectFiles = {
  "global.wglp": `version 1.2

var title = "Welcome"
var theme = "dark"
var size = 4
var accent = gradient(lr, blue, red)
`,
  "main.wglp": `version 1.2

imp google_font(Roboto, "Open Sans")

pub title, theme, size, accent

page.title("My 1.2 Site")

if $theme is "dark" {
    background.color(black)
}
else if $theme is "light" {
    background.color(white)
}
else {
    background.color(merge(white, yellow))
}

if $size >= 4 and $theme is "dark" {
    page.text($title, $size, $accent, Roboto)
}
else {
    page.text("Fallback", 3, red, "Open Sans")
}

page.img("https://picsum.photos/200", 200, 200)
`
};

let assets = {};
let activeFile = "main.wglp";
let wglpVars = {};
let globalVars = {};

const editor = document.getElementById("editor");
const fileList = document.getElementById("fileList");
const preview = document.getElementById("preview");
const consoleBox = document.getElementById("console");
const tabName = document.getElementById("tabName");

function log(msg){
  consoleBox.innerHTML += "<div>"+msg+"</div>";
  consoleBox.scrollTop = consoleBox.scrollHeight;
}

function renderFiles(){
  fileList.innerHTML = "";

  const filesLabel = document.createElement("div");
  filesLabel.className = "sectionLabel";
  filesLabel.textContent = "Files";
  fileList.appendChild(filesLabel);

  for(let f in projectFiles){
    let div = document.createElement("div");
    div.className = "file"+(f===activeFile?" active":"");
    div.innerHTML = `<span class="fileIcon">📄</span> <span>${f}</span>`;
    div.onclick = ()=>switchFile(f);
    fileList.appendChild(div);
  }

  const assetKeys = Object.keys(assets);
  if(assetKeys.length > 0){
    const assetsLabel = document.createElement("div");
    assetsLabel.className = "sectionLabel";
    assetsLabel.textContent = "Assets";
    fileList.appendChild(assetsLabel);

    for(let a of assetKeys){
      let div = document.createElement("div");
      div.className = "file";
      div.innerHTML = `<span class="fileIcon">🖼️</span> <span>${a}</span>`;
      fileList.appendChild(div);
    }
  }
}

function switchFile(f){
  projectFiles[activeFile] = editor.value;
  activeFile = f;
  editor.value = projectFiles[f];
  tabName.textContent = f;
  renderFiles();
  update();
}

function addFile(){
  let name = prompt("File name (.wglp):");
  if(!name) return;
  if(!name.endsWith(".wglp")) name += ".wglp";
  if(projectFiles[name]){
    alert("File already exists.");
    return;
  }
  projectFiles[name] = "version 1.0\n";
  switchFile(name);
}

function uploadFiles(e){
  for(let file of e.target.files){
    let reader = new FileReader();
    reader.onload = ()=>{
      assets[file.name] = reader.result;
      log("Uploaded: "+file.name);
      renderFiles();
    };
    reader.readAsDataURL(file);
  }
}

function getVersion(code){
  let v = code.match(/version\s+([0-9.]+)/);
  if(!v) return "1.0";
  return v[1].trim();
}

function collectGlobalVars(){
  globalVars = {};
  for(let fname in projectFiles){
    let code = projectFiles[fname];
    let version = getVersion(code);
    if(version !== "1.2") continue;
    let varRegex = /var\s+([a-zA-Z0-9_]+)\s*=\s*(.+)/g;
    let m;
    while(m = varRegex.exec(code)){
      let name = m[1].trim();
      let value = m[2].trim();
      globalVars[name] = value;
    }
  }
}

function parseVariables(code){
  wglpVars = {};
  let varRegex = /var\s+([a-zA-Z0-9_]+)\s*=\s*(.+)/g;
  let m;
  while(m = varRegex.exec(code)){
    let name = m[1].trim();
    let value = m[2].trim();
    wglpVars[name] = value;
  }
}

function importPubVars(code){
  let pubMatch = code.match(/pub\s+([^\n]+)/);
  if(!pubMatch) return;
  let list = pubMatch[1].split(",").map(x => x.trim()).filter(Boolean);
  for(let v of list){
    if(!(v in globalVars)){
      log("❌ ERROR: global variable '"+v+"' not found.");
      continue;
    }
    wglpVars[v] = globalVars[v];
  }
}

function resolveVars(str){
  return str.replace(/\$([a-zA-Z0-9_]+)/g, (full, name) => {
    if(!(name in wglpVars)){
      log("❌ ERROR: variable '$"+name+"' not defined.");
      return full;
    }
    return wglpVars[name];
  });
}

function valueToJS(v){
  if(!isNaN(parseFloat(v)) && isFinite(v)) return String(Number(v));
  if(/^".*"$/.test(v) || /^'.*'$/.test(v)) return v;
  return JSON.stringify(v);
}

function evalCondition(cond){
  let condStr = cond;

  condStr = condStr.replace(/\$([a-zA-Z0-9_]+)/g, (full, name) => {
    if(!(name in wglpVars)){
      log("❌ ERROR: variable '$"+name+"' not defined in condition.");
      throw new Error("Undefined variable "+name);
    }
    return valueToJS(wglpVars[name]);
  });

  condStr = condStr.replace(/\bis\b/g, "==")
                   .replace(/\band\b/g, "&&")
                   .replace(/\bor\b/g, "||");

  try{
    let fn = new Function("return ("+condStr+");");
    return !!fn();
  }catch(e){
    log("❌ ERROR in condition: "+cond+" -> "+e.message);
    return false;
  }
}

function processControlFlow(code){
  let lines = code.split(/\r?\n/);
  let result = [];
  let stack = [];
  let currentActive = true;

  for(let i=0;i<lines.length;i++){
    let line = lines[i];
    let trimmed = line.trim();

    if(trimmed.startsWith("if ")){
      let condPart = trimmed.slice(2).trim();
      let braceIndex = condPart.indexOf("{");
      let cond = braceIndex >= 0 ? condPart.slice(0, braceIndex).trim() : condPart;

      let parentActive = currentActive;
      let condVal = false;

      if(parentActive){
        condVal = evalCondition(cond);
      }

      stack.push({
        parentActive,
        alreadyMatched: condVal,
        inElseChain: true
      });

      currentActive = parentActive && condVal;
      continue;
    }

    if(trimmed.startsWith("else if ")){
      let top = stack[stack.length - 1];
      if(!top || !top.inElseChain){
        result.push(line);
        continue;
      }

      let condPart = trimmed.slice(7).trim();
      let braceIndex = condPart.indexOf("{");
      let cond = braceIndex >= 0 ? condPart.slice(0, braceIndex).trim() : condPart;

      let condVal = false;

      if(top.parentActive && !top.alreadyMatched){
        condVal = evalCondition(cond);
      }

      top.alreadyMatched = top.alreadyMatched || condVal;
      currentActive = top.parentActive && condVal;
      continue;
    }

    if(trimmed.startsWith("else")){
      let top = stack[stack.length - 1];
      if(!top || !top.inElseChain){
        result.push(line);
        continue;
      }

      let active = top.parentActive && !top.alreadyMatched;
      currentActive = active;
      continue;
    }

    if(trimmed === "}"){
      let top = stack.pop();
      if(top){
        currentActive = top.parentActive;
      }
      continue;
    }

    if(currentActive){
      result.push(line);
    }
  }

  return result.join("\n");
}

function mergeColors(c1, c2){
  function toRGB(c){
    c = parseColor(c);
    let m = c.match(/rgb[a]?\((\d+),\s*(\d+),\s*(\d+)/);
    return m ? [parseInt(m[1]), parseInt(m[2]), parseInt(m[3])] : [0,0,0];
  }

  let a = toRGB(c1);
  let b = toRGB(c2);

  let r = Math.round((a[0] + b[0]) / 2);
  let g = Math.round((a[1] + b[1]) / 2);
  let b2 = Math.round((a[2] + b[2]) / 2);

  return `rgb(${r},${g},${b2})`;
}

function parseGradient(args){
  let parts = args.split(",").map(x=>x.trim());
  let direction = parts.shift();

  if(parts.length < 2){
    log("❌ ERROR: gradient() requires at least 2 colors.");
    return "rgb(0,0,0)";
  }

  let dirMap = {
    lr:"to right",
    rl:"to left",
    ud:"to bottom",
    du:"to top"
  };

  let cssDir = dirMap[direction] || "to right";
  let colors = parts.map(c => parseColor(c));
  return {direction:cssDir, colors};
}

function parseColor(c){
  c = c.trim().toLowerCase();

  if(c.startsWith("gradient(")){
    let inside = c.slice(9, -1);
    return parseGradient(inside);
  }

  if(c.startsWith("merge(")){
    let inside = c.slice(6, -1);
    let parts = inside.split(",");
    if(parts.length === 2){
      return mergeColors(parts[0].trim(), parts[1].trim());
    }
  }

  if(c.startsWith("rgb(") || c.startsWith("rgba(")){
    return c;
  }

  const map = {
    red:"rgb(255,0,0)",
    blue:"rgb(0,0,255)",
    green:"rgb(0,255,0)",
    white:"rgb(255,255,255)",
    black:"rgb(0,0,0)",
    yellow:"rgb(255,255,0)"
  };

  return map[c] || "rgb(0,0,0)";
}

function applyGoogleFontsFromImp(code){
  let match = code.match(/imp\s+google_font\(([^)]+)\)/);
  if(!match) return;

  let raw = match[1];
  let fonts = raw.split(",")
                 .map(f => f.trim())
                 .filter(f => f.length > 0)
                 .map(f => {
                   if(/^".*"$/.test(f) || /^'.*'$/.test(f)) return f.slice(1,-1);
                   return f;
                 });

  if(fonts.length === 0) return;

  let families = fonts.map(f => "family=" + f.replace(/ /g, "+")).join("&");
  let href = "https://fonts.googleapis.com/css2?" + families + "&display=swap";

  let existing = document.getElementById("googleFontsLink");
  if(existing){
    existing.href = href;
  } else {
    let link = document.createElement("link");
    link.id = "googleFontsLink";
    link.rel = "stylesheet";
    link.href = href;
    document.head.appendChild(link);
  }
}

function update(){
  preview.innerHTML = "";
  let rawCode = editor.value;
  let version = getVersion(rawCode);
  let code = rawCode;

  collectGlobalVars();

  if(version === "1.2"){
    parseVariables(rawCode);
    importPubVars(rawCode);
    code = processControlFlow(rawCode);
    code = resolveVars(code);
  } else {
    wglpVars = {};
  }

  applyGoogleFontsFromImp(code);

  let title = code.match(/page\.title\("([^"]+)"\)/);
  if(title) document.title = title[1];

  let bg = code.match(/background\.color\((.*?)\)/);
  if(bg){
    let raw = bg[1].trim();
    let parsed = parseColor(raw);
    if(parsed && typeof parsed === "object" && parsed.colors){
      preview.style.background = `linear-gradient(${parsed.direction}, ${parsed.colors.join(",")})`;
    } else {
      preview.style.background = parsed;
    }
  }

  let textRegex = /page\.text\("([^"]+)"\s*,\s*([1-5])(?:\s*,\s*([^,]+?)\s*)?(?:,\s*([^)]+))?\)/g;
  let m;
  while(m = textRegex.exec(code)){
    let div = document.createElement("div");
    div.className = "previewText";

    let sizes=[14,18,24,32,42];
    div.style.fontSize = sizes[m[2]-1]+"px";

    if(m[3]){
      let parsed = parseColor(m[3]);
      if(parsed && typeof parsed === "object" && parsed.colors){
        div.style.background = `linear-gradient(${parsed.direction}, ${parsed.colors.join(",")})`;
        div.style.webkitBackgroundClip = "text";
        div.style.webkitTextFillColor = "transparent";
        div.style.color = "transparent";
      } else {
        div.style.color = parsed;
      }
    }

    if(m[4]){
      let font = m[4].trim().replace(/['"]/g, "");
      div.style.fontFamily = `"${font}", sans-serif`;
    }

    div.textContent = m[1];
    preview.appendChild(div);
  }

  if(version === "1.0"){

    let imgNewCheck = /page\.img\("([^"]+)"\s*,\s*([0-9]+)\s*,\s*([0-9]+)\)/;
    if(imgNewCheck.test(code)){
      log("❌ ERROR: page.img(url, w, h) is a version 1.1+ feature.");
      return;
    }

    let imgOld = /page\.img\("([^"]+)"\)/g;
    while(m = imgOld.exec(code)){
      let src = m[1];
      if(assets[src]) src = assets[src];
      let img = document.createElement("img");
      img.src = src;
      preview.appendChild(img);
    }

  } else if(version === "1.1" || version === "1.2"){

    let imgNew = /page\.img\("([^"]+)"\s*,\s*([0-9]+)\s*,\s*([0-9]+)\)/g;
    while(m = imgNew.exec(code)){
      let src = m[1];
      if(assets[src]) src = assets[src];
      let img = document.createElement("img");
      img.src = src;
      img.style.width = m[2] + "px";
      img.style.height = m[3] + "px";
      preview.appendChild(img);
    }

    let imgOld = /page\.img\("([^"]+)"\)/g;
    while(m = imgOld.exec(code)){
      let src = m[1];
      if(assets[src]) src = assets[src];
      let img = document.createElement("img");
      img.src = src;
      preview.appendChild(img);
    }
  }
}

function run(){
  consoleBox.innerHTML = "";
  log("Running WGLP...");
  projectFiles[activeFile] = editor.value;
  update();
  log("Done.");
}

editor.addEventListener("input", () => {
  projectFiles[activeFile] = editor.value;
  update();
});

editor.value = projectFiles[activeFile];
renderFiles();
update();
</script>

</body>
</html>
